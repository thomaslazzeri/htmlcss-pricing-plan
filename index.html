<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>htmlcss-pricing-plan</title>
</head>

<body>
    <main>
        <!-- header with title, description and icons -->
        <header>
            <h1>Our Pricing Plan</h1>
            <p>We are an industry-leading company that values honesty, integrity and efficiency, building quality
                products.</p>
            <div class="monthly">
                <p>Monthly </p>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-toggle-on" viewBox="0 0 16 16">
                    <path d="M5 3a5 5 0 0 0 0 10h6a5 5 0 0 0 0-10zm6 9a4 4 0 1 1 0-8 4 4 0 0 1 0 8" />
                </svg>
                <div class="yearly">Yearly</div>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-toggle-off" viewBox="0 0 16 16">
                    <path
                        d="M11 4a4 4 0 0 1 0 8H8a5 5 0 0 0 2-4 5 5 0 0 0-2-4zm-6 8a4 4 0 1 1 0-8 4 4 0 0 1 0 8M0 8a5 5 0 0 0 5 5h6a5 5 0 0 0 0-10H5a5 5 0 0 0-5 5" />
                </svg>
            </div>
        </header>












    </main>
</body>

</html>
